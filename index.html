<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🤍</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    width:380px;
    position:relative;
}

.hidden{display:none;}

button{
    margin-top:15px;
    padding:8px 18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:#ffb6c1;
    font-weight:bold;
}

button:hover{background:#ff69b4;color:white}

/* ================= GAME ================= */

#gameArea{
    position:relative;
    height:250px;
    overflow:hidden;
}

.heart{
    position:absolute;
    font-size:24px;
    cursor:pointer;
    transition:top 3s linear;
}

/* ================= CAKE ================= */

.cake-wrapper{
    position:relative;
    width:200px;
    height:160px;
    margin:20px auto;
}

.cake{
    position:absolute;
    bottom:0;
    width:200px;
    height:120px;
    background:#ffb6c1;
    border-radius:12px;
    z-index:3;
}

.candle{
    position:absolute;
    bottom:120px;
    width:10px;
    height:40px;
    border-radius:4px;
    z-index:4;
}

.candle1{ left:35px; background:gold; }
.candle2{ left:95px; background:orange; }
.candle3{ left:155px; background:purple; }

.flame{
    position:absolute;
    top:-18px;
    left:-3px;
    width:16px;
    height:18px;
    background:orange;
    border-radius:50%;
    animation:flicker 0.2s infinite alternate;
}

@keyframes flicker{
    from{transform:scale(1)}
    to{transform:scale(1.15)}
}

#countdown{
    font-size:28px;
    font-weight:bold;
    color:#ff1493;
}

/* ================= FIREWORKS ================= */

canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
    z-index:999;
}

/* ================= POPUP ================= */

#popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:30px 50px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    font-size:24px;
    font-weight:bold;
    display:none;
    z-index:2000;
}

</style>
</head>
<body>

<!-- MAIN -->
<div class="card" id="mainCard">
    <h2>🤍</h2>
    <p>My small gift for you.</p>
    <button onclick="openGame()">OPEN</button>
</div>

<!-- GAME -->
<div class="card hidden" id="gameCard">
    <h3>Catch 5 Hearts 🤍</h3>
    <p id="score">Score: 0</p>
    <div id="gameArea"></div>
</div>

<!-- CAKE -->
<div class="card hidden" id="cakeCard">
    <h2>Make a Wish 🤍</h2>
    <div id="countdown">5</div>

    <div class="cake-wrapper">
        <div class="cake"></div>

        <div class="candle candle1"><div class="flame"></div></div>
        <div class="candle candle2"><div class="flame"></div></div>
        <div class="candle candle3"><div class="flame"></div></div>
    </div>

    <button id="startBtn" onclick="startCountdown()">Start</button>
    <button id="nextBtn" class="hidden" onclick="openBirthday()">Next</button>
</div>

<!-- POPUP -->
<div id="popup">you are finally 21 kiddo 🎉</div>

<!-- BIRTHDAY -->
<div class="card hidden" id="birthdayCard">
    <h2>Happy Birthday 🤍</h2>
    <p>i really dont care abt u thou.<br>(maybe im lying or not)</p>

    <button onclick="showSpecial(0)">Memory</button>
    <button onclick="showSpecial(1)">Why You Matter</button>
    <button onclick="showSpecial(2)">Final Surprise</button>
</div>

<!-- SPECIAL -->
<div class="card hidden" id="specialCard">
    <h2 id="specialTitle"></h2>
    <p id="specialText"></p>
    <button onclick="backToBirthday()">Back</button>
</div>

<canvas id="fireworks"></canvas>

<script>

/* Navigation */
function hideAll(){
    document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"));
}

/* ================= GAME ================= */

let score=0;
let gameInterval;

function openGame(){
    hideAll();
    document.getElementById("gameCard").classList.remove("hidden");
    startGame();
}

function startGame(){
    score=0;
    document.getElementById("score").innerText="Score: 0";
    gameInterval=setInterval(createHeart,800);
}

function createHeart(){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerText="🤍";
    heart.style.left=Math.random()*90+"%";
    heart.style.top="-20px";

    document.getElementById("gameArea").appendChild(heart);

    setTimeout(()=>heart.style.top="260px",50);

    heart.onclick=function(){
        score++;
        document.getElementById("score").innerText="Score: "+score;
        heart.remove();

        if(score>=5){
            clearInterval(gameInterval);
            setTimeout(()=>{
                hideAll();
                document.getElementById("cakeCard").classList.remove("hidden");
            },500);
        }
    };

    setTimeout(()=>heart.remove(),3000);
}

/* ================= CAKE ================= */

function startCountdown(){
    document.getElementById("startBtn").style.display="none";

    let time=5;
    let countdown=document.getElementById("countdown");

    let interval=setInterval(()=>{
        time--;
        countdown.innerText=time;

        if(time<=0){
            clearInterval(interval);

            document.querySelectorAll(".flame").forEach(f=>f.style.display="none");

            launchFireworks();
            showPopup();

            setTimeout(()=>{
                document.getElementById("nextBtn").classList.remove("hidden");
            },5000);
        }
    },1000);
}

/* ================= POPUP ================= */

function showPopup(){
    let popup=document.getElementById("popup");
    popup.style.display="block";
    setTimeout(()=>popup.style.display="none",4000);
}

/* ================= BIRTHDAY ================= */

function openBirthday(){
    hideAll();
    document.getElementById("birthdayCard").classList.remove("hidden");
}

const specialCards=[
{
title:"Memory 🤍",
text:"Talking to you became my comfort zone."
},
{
title:"Why You Matter 🤍",
text:"You always mattered. Even when you think you didn't."
},
{
title:"Final Surprise 🤍",
text:"Happy 21st. Whether you like it or not, you're special."
}
];

function showSpecial(i){
    hideAll();
    document.getElementById("specialCard").classList.remove("hidden");
    document.getElementById("specialTitle").innerText=specialCards[i].title;
    document.getElementById("specialText").innerText=specialCards[i].text;
}

function backToBirthday(){
    hideAll();
    document.getElementById("birthdayCard").classList.remove("hidden");
}

/* ================= FIREWORKS ================= */

const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize",()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let particles=[];

function launchFireworks(){
    for(let b=0;b<6;b++){
        setTimeout(()=>{
            createExplosion(
                Math.random()*canvas.width,
                Math.random()*canvas.height/1.5
            );
        },b*300);
    }
}

function createExplosion(x,y){
    for(let i=0;i<120;i++){
        particles.push({
            x:x,
            y:y,
            speedX:(Math.random()-0.5)*12,
            speedY:(Math.random()-0.5)*12,
            radius:2+Math.random()*3,
            alpha:1,
            color:`hsl(${Math.random()*360},100%,50%)`
        });
    }
    animateFireworks();
}

function animateFireworks(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=p.speedX;
        p.y+=p.speedY;
        p.alpha-=0.015;

        ctx.globalAlpha=p.alpha;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();

        if(p.alpha<=0){
            particles.splice(i,1);
        }
    });

    ctx.globalAlpha=1;

    if(particles.length>0){
        requestAnimationFrame(animateFireworks);
    }
}

</script>
</body>
</html>
