<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🤍</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-image: url("PAGE 1.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    color: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    max-width: 420px;
    position: relative;
    transition: 0.5s ease;
}

h1 { margin-bottom: 20px; }

button {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    background: white;
    color: #1e1e2f;
    transition: 0.3s;
}

button:hover { background: #ffb6c1; }

.hidden { display: none; }

#gameArea {
    position: relative;
    height: 250px;
    overflow: hidden;
    margin-top: 15px;
}

#score {
    font-weight: bold;
    margin-top: 10px;
}

/* Cake */

.cake {
    position: relative;
    width: 200px;
    height: 120px;
    background: #ffb6c1;
    border-radius: 10px;
    margin: 20px auto;
}

.candle {
    position: absolute;
    top: -40px;
    width: 10px;
    height: 40px;
    background: white;
    left: 95px;
}

.flame {
    position: absolute;
    top: -60px;
    left: 92px;
    width: 16px;
    height: 20px;
    background: orange;
    border-radius: 50%;
    animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

#countdown {
    font-size: 30px;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<!-- MAIN -->

<div class="card" id="mainCard">
    <h1>🤍</h1>
    <p>My small gift for a wonderful person.</p>
    <button onclick="openCard()">OPEN</button>
</div>

<!-- MINI GAME -->

<div class="card hidden" id="gameCard">
    <h1>Catch 5 Hearts 🤍</h1>
    <p>Click the falling hearts!</p>
    <div id="score">Score: 0</div>
    <div id="gameArea"></div>
</div>

<!-- CAKE -->

<div class="card hidden" id="cakeCard">
    <h1>Make a Wish 🤍</h1>
    <div id="countdown">5</div>

    <div class="cake">
        <div class="candle"></div>
        <div class="flame" id="flame"></div>
    </div>

    <button onclick="startCountdown()">Start</button>
</div>

<!-- BIRTHDAY CARD -->

<div class="card hidden" id="birthdayCard">
    <h1>Happy Birthday 🤍</h1>
    <p>i really dont care abt u thou.<br>(maybe im lying or not)</p>
</div>

<script>

/* Navigation */

function openCard() {
    hideAll();
    document.getElementById('gameCard').classList.remove('hidden');
    startGame();
}

function hideAll() {
    document.querySelectorAll('.card').forEach(card => card.classList.add('hidden'));
}

/* ===== MINI GAME ===== */

let score = 0;
let gameInterval;

function startGame() {
    score = 0;
    document.getElementById("score").innerText = "Score: 0";
    document.getElementById("gameArea").innerHTML = "";
    gameInterval = setInterval(createHeart, 800);
}

function createHeart() {
    let heart = document.createElement("div");
    heart.innerText = "🤍";
    heart.style.position = "absolute";
    heart.style.left = Math.random() * 90 + "%";
    heart.style.top = "-20px";
    heart.style.fontSize = "24px";
    heart.style.cursor = "pointer";
    heart.style.transition = "top 3s linear";

    document.getElementById("gameArea").appendChild(heart);

    setTimeout(() => {
        heart.style.top = "260px";
    }, 50);

    heart.onclick = function() {
        score++;
        document.getElementById("score").innerText = "Score: " + score;
        heart.remove();

        if (score >= 5) {
            clearInterval(gameInterval);
            setTimeout(() => {
                hideAll();
                document.getElementById('cakeCard').classList.remove('hidden');
            }, 500);
        }
    };

    setTimeout(() => heart.remove(), 3000);
}

/* ===== CAKE ===== */

let time = 5;

function startCountdown() {
    time = 5;
    document.getElementById("countdown").innerText = time;
    document.getElementById("flame").style.display = "block";

    let interval = setInterval(() => {
        time--;
        document.getElementById("countdown").innerText = time;

        if (time <= 0) {
            clearInterval(interval);
            document.getElementById("countdown").innerText = "🎉 Happy Birthday 🎉";
            document.getElementById("flame").style.display = "none";

            setTimeout(() => {
                hideAll();
                document.getElementById('birthdayCard').classList.remove('hidden');
            }, 2000);
        }
    }, 1000);
}

</script>

</body>
</html>
