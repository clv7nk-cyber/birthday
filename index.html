<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🤍</title>

<style>

/* ===== BODY ===== */

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-image: url("PAGE 1.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

/* ===== CARD ===== */

.card {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    max-width: 420px;
    position: relative;
}

.hidden {
    display: none;
}

/* ===== END IMAGES ===== */

.end-images {
    margin-top: 20px;
}

.end-images img {
    width: 90px;
    margin: 10px;
    animation: float 3s ease-in-out infinite;
}

/* Stitch image */

.stitch {
    width: 120px;
    margin-top: 20px;
}

/* Floating animation */

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
}

button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: white;
}

</style>
</head>

<body>

<!-- MAIN CARD -->

<div class="card" id="birthdayCard">
    <h1>Happy Birthday 🤍</h1>
    <p>
        No pressure. No past.<br>
        Just gratitude that I get to know you.<br><br>
        I hope this year gives you peace, growth,<br>
        and everything you truly deserve.
    </p>

    <!-- Images Section -->
    <div class="end-images">
        <img src="flowers.png">
        <img src="flowers.png">
        <img src="chocolate.png">
        <img src="chocolate.png">
    </div>

    <!-- Stitch -->
    <img src="stitch.png" class="stitch">
</div>

</body>
</html>
