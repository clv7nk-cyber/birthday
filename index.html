<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🤍</title>

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background-image: url("PAGE 1.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.08);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    max-width: 420px;
}

.hidden { display: none; }

button {
    margin: 8px;
    padding: 8px 16px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    background: white;
}

input {
    padding: 8px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
    width: 80%;
}

#message {
    margin-top: 10px;
    font-weight: bold;
}

#compliment {
    margin-top: 10px;
    color: #ff69b4;
    font-weight: bold;
}

#countdown {
    font-size: 30px;
    margin-bottom: 10px;
}

/* Cake */
.cake {
    position: relative;
    width: 200px;
    height: 120px;
    background: #ffb6c1;
    border-radius: 10px;
    margin: 20px auto;
}

.candle {
    position: absolute;
    top: -40px;
    width: 10px;
    height: 40px;
    background: white;
    left: 95px;
}

.flame {
    position: absolute;
    top: -60px;
    left: 92px;
    width: 16px;
    height: 20px;
    background: orange;
    border-radius: 50%;
    animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
}

</style>
</head>

<body>

<!-- MAIN -->

<div class="card" id="mainCard">
    <h1>🤍</h1>
    <p>My small gift for a wonderful person.</p>
    <button onclick="openCard()">OPEN</button>
</div>

<!-- GAME -->

<div class="card hidden" id="gameCard">
    <h2 id="questionNumber"></h2>
    <p id="questionText"></p>

    <input type="text" id="answerInput" placeholder="Your answer...">
    <div id="message"></div>
    <div id="compliment"></div>

    <div style="margin-top:15px;">
        <button onclick="prevQuestion()">Previous</button>
        <button onclick="checkAnswer()">Check</button>
        <button onclick="nextQuestion()">Next</button>
    </div>
</div>

<!-- CAKE -->

<div class="card hidden" id="cakeCard">
    <h1>Make a Wish 🤍</h1>
    <div id="countdown">5</div>

    <div class="cake">
        <div class="candle"></div>
        <div class="flame" id="flame"></div>
    </div>

    <button onclick="startCountdown()">Start</button>
</div>

<!-- FINAL -->

<div class="card hidden" id="birthdayCard">
    <h1>Happy Birthday 🤍</h1>
    <p>i really dont care abt u thou.<br>(maybe im lying or not)</p>
</div>

<script>

/* DATA */

const questions = [
    "Our fav game in Roblox?",
    "Which person told you to text me after we didn’t talk?",
    "What did I save your name as in my phone?"
];

const answers = [
    "dress to impress",
    "mummy",
    "dora the explorer"
];
    
// Each question has a specific compliment
const compliments = [
    "you are pretty",        // Question 1
    "you deserve the world", // Question 2
    "good one shawty"        // Question 3
];

let currentQuestion = 0;
let userAnswers = new Array(questions.length).fill("");

/* NAVIGATION */

function hideAll() {
    document.querySelectorAll('.card').forEach(card => {
        card.classList.add('hidden');
    });
}

function openCard() {
    hideAll();
    document.getElementById('gameCard').classList.remove('hidden');
    loadQuestion();
}

/* LOAD QUESTION */

function loadQuestion() {
    document.getElementById("questionNumber").innerText =
        "Question " + (currentQuestion + 1) + " of " + questions.length;

    document.getElementById("questionText").innerText =
        questions[currentQuestion];

    document.getElementById("answerInput").value =
        userAnswers[currentQuestion];

    document.getElementById("message").innerText = "";
    document.getElementById("compliment").innerText = "";
}

/* CHECK ANSWER */

function checkAnswer() {
    let input = document.getElementById("answerInput").value.trim().toLowerCase();
    userAnswers[currentQuestion] = input;

    if (input === answers[currentQuestion]) {
        document.getElementById("message").innerText = "Correct 🤍";
        document.getElementById("compliment").innerText = compliments[currentQuestion];
    } else {
        document.getElementById("message").innerText = " u have a fake kundi😭";
        document.getElementById("compliment").innerText = "";
    }
}

/* NEXT */

function nextQuestion() {
    userAnswers[currentQuestion] = document.getElementById("answerInput").value.trim();

    if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        loadQuestion();
    } else {
        // Check if all answers correct
        let allCorrect = true;
        for (let i = 0; i < answers.length; i++) {
            if (userAnswers[i].trim().toLowerCase() !== answers[i]) {
                allCorrect = false;
                break;
            }
        }

        if (allCorrect) {
            hideAll();
            document.getElementById("cakeCard").classList.remove("hidden");
        } else {
            document.getElementById("message").innerText =
                "All answers must be correct to continue 🤍";
            document.getElementById("compliment").innerText = "";
        }
    }
}

/* PREVIOUS */

function prevQuestion() {
    userAnswers[currentQuestion] = document.getElementById("answerInput").value.trim();

    if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
    }
}

/* CAKE */

let time = 5;

function startCountdown() {
    time = 5;
    document.getElementById("countdown").innerText = time;
    document.getElementById("flame").style.display = "block";

    let interval = setInterval(() => {
        time--;
        document.getElementById("countdown").innerText = time;

        if (time <= 0) {
            clearInterval(interval);
            document.getElementById("countdown").innerText = "🎉 Happy Birthday 🎉";
            document.getElementById("flame").style.display = "none";

            setTimeout(() => {
                hideAll();
                document.getElementById("birthdayCard").classList.remove("hidden");
            }, 2000);
        }
    }, 1000);
}

</script>

</body>
</html>
