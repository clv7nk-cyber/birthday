<script>

/* Navigation */

function openCard() {
    hideAll();
    document.getElementById('gameCard').classList.remove('hidden');

    currentQuestion = 1;
    document.getElementById("question").innerText = "Question 1";
    document.getElementById("questionText").innerText = questions[0];
    document.getElementById("answerInput").value = "";
    document.getElementById("message").innerText = "";
}

function hideAll() {
    document.querySelectorAll('.card').forEach(card => card.classList.add('hidden'));
}

/* ===== 3 QUESTION GAME ===== */

let currentQuestion = 1;

const questions = [
    "Our fav game in Roblox?",
    "Which person told you to text me after we didn't talk?",
    "What did I save your name as in my phone?"
];

const answers = [
    "dress to impress",
    "mummy",
    "dora the explorer"
];

const compliments = [
    "you are pretty",
    "you deserve the world",
    "good one shawty"
];

function checkAnswer() {

    let input = document.getElementById("answerInput").value.trim().toLowerCase();
    let message = document.getElementById("message");

    if (input === answers[currentQuestion - 1]) {

        document.getElementById("answerInput").value = compliments[currentQuestion - 1];
        message.innerText = "Correct 🤍";

        setTimeout(() => {
            currentQuestion++;

            if (currentQuestion > 3) {
                hideAll();
                document.getElementById('cakeCard').classList.remove('hidden');
            } else {
                document.getElementById("question").innerText = "Question " + currentQuestion;
                document.getElementById("questionText").innerText = questions[currentQuestion - 1];
                document.getElementById("answerInput").value = "";
                message.innerText = "";
            }

        }, 1000);

    } else {
        message.innerText = 'You have a "fake kundi" 😭';
        document.getElementById("answerInput").value = "";
    }
}

/* ===== CAKE ===== */

let time = 5;

function startCountdown() {
    time = 5;
    document.getElementById("countdown").innerText = time;
    document.getElementById("flame").style.display = "block";

    let interval = setInterval(() => {
        time--;
        document.getElementById("countdown").innerText = time;

        if (time <= 0) {
            clearInterval(interval);
            document.getElementById("countdown").innerText = "🎉 Happy Birthday 🎉";
            document.getElementById("flame").style.display = "none";

            setTimeout(() => {
                hideAll();
                document.getElementById('birthdayCard').classList.remove('hidden');
            }, 2000);
        }
    }, 1000);
}

</script>
